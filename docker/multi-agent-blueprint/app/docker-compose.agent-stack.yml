services:
  coordinator:
    image: ubuntu:24.04
    container_name: ma-coordinator
    command: ["bash", "-lc", "sleep infinity"]
    tty: true
    stdin_open: true
    volumes:
      - ./app:/workspace/app
      - ./data:/workspace/data

